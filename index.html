<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Letter for Father's Day ❤️</title>
    <style>
        :root {
            --envelope-dark: #122240;
            --envelope-light: #1c3561;
            --stamp-red: #b32424;
            --parchment: #fcf8f2;
            --gold: #dfb76c;
            --bg-gradient: linear-gradient(135deg, #eef2f3 0%, #d5e0ea 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-gradient);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            perspective: 1500px;
        }

        /* --- Floating Icons Background --- */
        .hearts-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
            pointer-events: none;
        }

        .floating-heart {
            position: absolute;
            bottom: -50px;
            color: var(--envelope-light);
            font-size: 20px;
            opacity: 0.3;
            animation: floatUp 6s linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) rotate(0deg) scale(0.5);
                opacity: 0.5;
            }
            100% {
                transform: translateY(-105vh) rotate(360deg) scale(1.5);
                opacity: 0;
            }
        }

        /* --- Main Letter/Envelope Container --- */
        .card-container {
            width: 420px;
            height: 540px;
            position: relative;
            z-index: 10;
            cursor: pointer;
            transform-style: preserve-3d;
            transform: rotateX(15deg) rotateY(0deg);
            transition: transform 0.8s cubic-bezier(0.4, 0.0, 0.2, 1);
        }

        .card-container.open {
            transform: rotateX(0deg) rotateY(-180deg);
        }

        /* --- Envelope Outer & Letter Inside Sides --- */
        .card-front, .card-inside {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 4px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            backface-visibility: hidden;
            overflow: hidden;
        }

        /* --- Front Side: The Envelope Face --- */
        .card-front {
            background: var(--envelope-dark);
            border: 12px solid var(--envelope-light);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
            z-index: 2;
            transform: rotateY(0deg);
        }

        /* Envelope Design Accents */
        .envelope-lines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 1px solid rgba(223, 183, 108, 0.2);
            pointer-events: none;
        }

        .envelope-title {
            color: #ffffff;
            font-family: 'Georgia', serif;
            font-size: 1.8rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .envelope-subtitle {
            color: var(--gold);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 40px;
        }

        .wax-seal {
            width: 80px;
            height: 80px;
            background: var(--stamp-red);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
            color: var(--gold);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5), inset 0 0 10px rgba(0,0,0,0.3);
            animation: pulse 2.5s infinite;
            position: relative;
        }

        .click-hint {
            font-size: 0.8rem;
            color: #aaa;
            margin-top: 50px;
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: flash 1.5s infinite;
        }

        /* --- Inside Side: The Hand-written Letter --- */
        .card-inside {
            background: var(--parchment);
            border: 16px solid #fff;
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: flex-start;
            text-align: left;
            transform: rotateY(180deg); 
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.08);
            /* Line texture for the paper */
            background-image: linear-gradient(rgba(0,0,0,0.04) 1px, transparent 1px);
            background-size: 100% 2rem;
        }

        .letter-header {
            color: #222;
            font-family: 'Georgia', serif;
            font-size: 1.6rem;
            font-weight: bold;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 5px;
            width: 100%;
            margin-bottom: 15px;
        }

        .letter-body {
            color: #333;
            font-family: 'Georgia', serif;
            font-size: 1.15rem;
            line-height: 2rem;
            font-style: italic;
            text-indent: 30px;
            flex-grow: 1;
        }

        .letter-footer {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            margin-top: 15px;
        }

        .signature {
            font-family: 'Georgia', serif;
            color: var(--stamp-red);
            font-weight: bold;
            font-size: 1.3rem;
            font-style: italic;
            margin-top: 5px;
        }

        /* --- Confetti Effect --- */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            z-index: 100;
            opacity: 0;
        }

        /* --- Animations --- */
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
            50% { transform: scale(1.04); box-shadow: 0 6px 15px rgba(179, 36, 36, 0.4); }
            100% { transform: scale(1); box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        }

        @keyframes flash {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        @keyframes confettiFall {
            0% { transform: translateY(-50px) translateX(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) translateX(100px) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="hearts-bg" id="heartsBg"></div>

    <div class="card-container" id="letterEnvelope" onclick="openCard()">
        <div class="card-front">
            <div class="envelope-lines"></div>
            <h1 class="envelope-title">To My Papa</h1>
            <p class="envelope-subtitle">Happy Father's Day!</p>
            
            <div class="wax-seal">❤️</div>
            
            <div class="click-hint">✨ Click Seal to Open Letter ✨</div>
        </div>

        <div class="card-inside">
            <div class="letter-header">Dearest Dad,</div>
            
            <img src="familypic.jpg" alt="My Father" style="max-width: 100%; height: auto; margin: 20px 0;">
            
            <div class="letter-footer">
                
                <p class="signature">Ingat ka lagi papa ❤️</p>
            </div>
        </div>
    </div>

    <script>
        // 1. Create continuous floating background environment elements
        const heartsBg = document.getElementById('heartsBg');
        const letterIcons = ['👔', '⭐', '❤️', '✉️', '✨', '❤️'];

        function createBgHeart() {
            const icon = document.createElement('div');
            icon.classList.add('floating-heart');
            icon.innerText = letterIcons[Math.floor(Math.random() * letterIcons.length)];
            
            icon.style.left = Math.random() * 100 + 'vw';
            icon.style.fontSize = Math.random() * 20 + 15 + 'px';
            icon.style.animationDuration = Math.random() * 3 + 4 + 's'; 
            
            heartsBg.appendChild(icon);

            setTimeout(() => {
                icon.remove();
            }, 7000);
        }

        setInterval(createBgHeart, 350);

        // 2. Open/Close Mechanism with Rich Confetti
        let isOpen = false;
        
        function openCard() {
            const envelope = document.getElementById('letterEnvelope');
            
            if (!isOpen) {
                envelope.classList.add('open');
                isOpen = true;
                for(let i = 0; i < 5; i++) {
                    setTimeout(triggerConfetti, i * 150);
                }
            } else {
                envelope.classList.remove('open');
                isOpen = false;
            }
        }

        // 3. Confetti Burst Generator
        function triggerConfetti() {
            const colors = ['#dfb76c', '#1c3561', '#b32424', '#ffd700', '#ffffff', '#2a5298'];
            const shapes = ['50%', '0%']; 

            for (let i = 0; i < 35; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.borderRadius = shapes[Math.floor(Math.random() * shapes.length)];
                
                confetti.style.left = (window.innerWidth / 2) + (Math.random() * 200 - 100) + 'px';
                confetti.style.top = (window.innerHeight / 2) + (Math.random() * 200 - 100) + 'px';
                
                const destinationX = (Math.random() * 600 - 300) + 'px';
                const duration = Math.random() * 2 + 1.5 + 's';
                
                confetti.style.animation = `confettiFall ${duration} ease-out forwards`;
                confetti.style.setProperty('--x', destinationX);
                
                document.body.appendChild(confetti);

                setTimeout(() => {
                    confetti.remove();
                }, 3500);
            }
        }
    </script>
</body>
</html>
